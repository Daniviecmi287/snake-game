<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-grid"></div>

  <div class="container">
    <header class="header">
      <h1 class="title">SNAKE<span class="accent">.</span>IO</h1>
      <p class="subtitle">Classic arcade — reimagined</p>
    </header>

    <div class="hud">
      <div class="hud-block">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-block center-hud">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="level">1</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">BEST</span>
        <span class="hud-value" id="highscore">0</span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <div class="overlay-icon" id="overlayIcon">▶</div>
          <h2 class="overlay-title" id="overlayTitle">READY?</h2>
          <p class="overlay-msg" id="overlayMsg">Use arrow keys or WASD to move</p>
          <button class="btn" id="startBtn">START GAME</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="key-row">
        <button class="key-btn" id="upBtn">▲</button>
      </div>
      <div class="key-row">
        <button class="key-btn" id="leftBtn">◀</button>
        <button class="key-btn" id="downBtn">▼</button>
        <button class="key-btn" id="rightBtn">▶</button>
      </div>
    </div>

    <footer class="footer">
      <span>🎮 Snake Game &nbsp;|&nbsp; Built with Vanilla JS</span>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
